services:
  db:
    image: postgres:16-alpine
    container_name: altairis-db
    environment:
      POSTGRES_USER: altairis
      POSTGRES_PASSWORD: altairis
      POSTGRES_DB: altairis
    volumes:
      - altairis_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U altairis -d altairis"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: altairis-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      ConnectionStrings__Default: "Host=db;Port=5432;Database=altairis;Username=altairis;Password=altairis"
      Jwt__Key: "altairis-super-secret-demo-key-CHANGE-ME-in-production-32chars"
      Jwt__Issuer: "altairis"
      Jwt__Audience: "altairis-clients"
      Jwt__ExpiresHours: "8"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8080"
    container_name: altairis-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    ports:
      - "3000:3000"

volumes:
  altairis_db:
